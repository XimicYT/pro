<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal Proxy</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; }
        input { padding: 12px; width: 300px; border-radius: 5px; border: none; }
        button { padding: 12px 20px; background: #007bff; color: white; border: none; cursor: pointer; margin-left: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Universal Proxy</h1>
    <div>
        <input type="text" id="urlInput" placeholder="https://google.com">
        <button onclick="launch()">Go</button>
    </div>

    <script>
        function launch() {
            const url = document.getElementById('urlInput').value;
            if (url) {
                window.location.href = `/proxy?url=${encodeURIComponent(url)}`;
            }
        }
    </script>
</body>
</html>
